<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <title>Финал</title>
    <link href="https://fonts.sberbank.ru/css?family=SB+Sans:300,400,500,600,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/css/style.css">
    <style>
        html, body {
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.42);
        }
        #question-container {
            flex: 0 0 auto;
            padding: 0 40px;
            height: 14.5vh;
            margin: 0 auto 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #cat-container video {
            min-width: 100%;
        }
    </style>
</head>
<body>
<script src="src/js/webgl-video-processor.js"></script>
<script src="src/js/config.js"></script>
<div id="soundOverlay">
    <div class="soundBox">
        <div style="color:white; font-size: 60px; margin-bottom: 30px">Готов посмотреть результат?</div>
        <button id="soundStartBtn">Смотреть!</button>
    </div>
</div>

<div id="main-content">
    <video id="arjs-video" playsinline autoplay muted></video>

    <div id="main-container">
        <div id="progress-bar" style="margin-top: 20px">
            <div class="step" id="step1"></div>
            <div class="step" id="step2"></div>
            <div class="step" id="step3"></div>
        </div>
        <div id="question-containe" style="height:8vh; display:flex; justify-content:flex-end; align-items:center; margin: 1vh 0; padding-right: 10vw;">
            <div id="skipVideoButton" style=" z-index: 1000; height: 100%; aspect-ratio: 1/1; border-radius: 50%; cursor: pointer; border:1px solid rgba(255, 255, 255, 0.4); background: #77777766 url(./svg/array.svg) no-repeat center; background-size: 70%; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display:none">
            </div>
        </div>
        <div id="question-container">
            <div id="final-points" style="
                font-size:40px;
                font-weight:700;
                height: 13.5vh;
                overflow: hidden;
                word-wrap: break-word;
                text-align: center;
                display: flex;
                flex-direction: column;
                justify-content: center;
            ">
            </div>
        </div>
        <div id="cat-container">
                    <canvas id="cat-canvas"></canvas>
                </div>
        <div class="third" style="height: 15vh"></div>
    </div>

    <div id="final-ui" style="display: none;"></div>

    <div id="final-ui2" style="
      position: fixed;
      bottom: 4%;
      left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      padding: 30px;
      background: rgba(0,0,0,0);
      border-radius: 35px;
      text-align: center;
      color: white;
      font-family: sans-serif;
      font-size: 40px;
      display: none;
      z-index: 1001;">
        <button id="shareBtn" style="
        width: 100%;
        padding: 20px;
        height: 140px;
        margin-bottom: 20px;
        border-radius: 90px;
        border:none;
        font-size:40px;
        color:white;
        background: linear-gradient(100deg, rgba(250, 237, 0, 1), rgba(88, 213, 105, 1),rgba(32, 199, 209, 1));
      ">Поделиться
        </button>

        <button id="retryBtn" style="
        width: 100%;
        padding: 20px;
        height: 140px;
        border-radius: 90px;
        border:none;
        font-size:40px;
        color:white;
        background: rgba(255,255,255,0.25);
      ">Пройти ещё раз
        </button>
    </div>

</div>
<div id="interaction-required-popup"
     style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px); background: rgba(0,0,0,0.25); z-index: 9999999; display: none; align-items: center; justify-content: center;">
    <div class="soundBox">
        <!--        <div style="color:white; font-size: 60px; margin-bottom: 30px">Готов начать?</div>-->
        <button id="interaction-btn"
                style="font-size: 42px; padding: 30px 70px; border-radius: 90px; background: linear-gradient(100deg, rgba(250, 237, 0, 1), rgba(88, 213, 105, 1),rgba(32, 199, 209, 1)); color: white; border: none; cursor: pointer;">
            Готов
        </button>
    </div>
</div>
<div id="blur-overlay"></div>
<div id="orientation-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: black; color: white; display: flex; align-items: center; justify-content: center; z-index: 999999999;">
    <p style="font-size: 5vw; text-align: center;">Пожалуйста, поверните экран</p>
</div>
<script>

    function checkOrientation() {
        const overlay = document.getElementById('orientation-overlay');
        // Show overlay if width is greater than height (landscape orientation)
        if (window.innerWidth > window.innerHeight) {
            overlay.style.display = 'flex';
        } else {
            overlay.style.display = 'none';
        }
    }

    // Initial check on page load
    document.addEventListener('DOMContentLoaded', checkOrientation);
    // Re-check on window resize and orientation change events
    window.addEventListener('resize', checkOrientation);
    window.addEventListener('orientationchange', checkOrientation);


    const urlParams = getUrlParams();
    const SCENE_UUID = urlParams.uuid || '21e41c43-b5b1-490a-a27f-beb3331ee483';
    const STATION = urlParams.station ? parseInt(urlParams.station) : 5;
    const isAndroid = /Android/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    let catCanvas, webglProcessor;
    let totalBalls = 0;
    let isWrongStationHandled = false;

    async function createStatistics(sceneUuid, station = null, points = null) {
        const userUuid = localStorage.getItem('user_id');
        try {
            const body = {
                user_uuid: userUuid,
                scene_uuid: sceneUuid
            };
            if (station !== null) body.station = station;
            if (points !== null) body.points = points;

            const response = await fetch(`${API_BASE_URL}/webapp/create_statistics`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'api_key': API_KEY
                },
                body: JSON.stringify(body)
            });
            if (response.ok) {
                const result = await response.json();
                return result;
            } else {
                console.error('Failed to create statistics:', response.status);
                return null;
            }
        } catch (error) {
            console.error('Error creating statistics:', error);
            return null;
        }
    }
    async function startWebcam() {
        const webcamFeed = document.getElementById('arjs-video');
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: {ideal: "environment"},
                    width: {ideal: 1280},
                    height: {ideal: 720},
                    frameRate: { ideal: 24, max: 24 }
                },
                audio: false
            });
            webcamFeed.srcObject = stream;
        } catch (err) {
            console.error("Error accessing webcam: ", err);
            document.getElementById('camera-access-required').style.display = 'block';
        }
    }

    

    function handleWrongStation() {
        if (isWrongStationHandled) return;
        isWrongStationHandled = true;

        document.getElementById('final-ui2').style.display = 'block';
        document.getElementById('final-ui2').innerHTML = '';

        const questionContainer = document.getElementById('question-container');
        questionContainer.style.display = 'flex';
        questionContainer.innerHTML = `<div style="text-align: center;"><div style="font-size: 50px;text-align: center; padding-bottom: 5px;">Эй, следопыт, ты потерялся!</div><div style="font-size: 40px;">Это не та станция. Вернись к предыдущей и следуй по следам!</div></div>`;

        videos.forEach(v => {
            v.pause();
            v.muted = true;
            v.currentTime = 0;
            if (isAndroid) {
                v.style.display = 'none';
            }
        });

        document.getElementById('blur-overlay').style.display = 'block';

        const wrongStationBtn = document.createElement('button');
        wrongStationBtn.id = 'wrong-btn';
        wrongStationBtn.className = 'primary';
        wrongStationBtn.textContent = 'Вернуться к поиску';
        wrongStationBtn.style.display = 'none';
        wrongStationBtn.onclick = function () {
            document.getElementById('blur-overlay').style.display = 'none';
            window.location.href = 'qr.html';
        };

        const finalUi2 = document.getElementById('final-ui2');
        finalUi2.appendChild(wrongStationBtn);


        playVideo('mp4/cat_2_scene_wrong_station_25Fps 2_1.mp4', false);
    }

    function init() {
        startWebcam();
        catCanvas = document.getElementById('cat-canvas');

        if (isAndroid || isIOS) {
            catCanvas.style.display = 'none';
        }

        const currentFile = window.location.pathname.split('/').pop();
        let expectedStation = localStorage.getItem('currentStation');

        if (((currentFile !== expectedStation) && expectedStation) || !expectedStation) {
            document.getElementById('soundOverlay').style.display = 'none';
            const interactionPopup = document.getElementById('interaction-required-popup');
            interactionPopup.style.display = 'flex';
            document.getElementById('interaction-btn').onclick = () => {
                interactionPopup.style.display = 'none';
                if (!isWrongStationHandled) {
                    handleWrongStation();
                }
            };
        }
    }
    const soundStartBtn = document.getElementById('soundStartBtn');
    soundStartBtn.addEventListener('click', () => {
        soundOverlay.style.display = 'none';
        totalBalls = localStorage.getItem('total_balls') || 0;
        finishQuiz();
    });
    function finishQuiz() {
        createStatistics(SCENE_UUID, STATION);
        const finalUI = document.getElementById("final-ui");
        finalUI.style.display = "block";
        
        // Directly show the final UI elements
        if (catCanvas) {
            catCanvas.style.display = 'none';
        }
        document.getElementById("final-ui2").style.display = "block";
        document.getElementById("final-message-after-video").style.display = "block";
        document.getElementById("final-points").style.height="auto";
        document.getElementById("final-points").style.padding="10px";
        document.getElementById("question-container").style.height="auto";

        function getCoinDeclension(number) {
            number = Math.abs(number);
            if (number % 10 === 1 && number % 100 !== 11) return 'монета';
            if ([2, 3, 4].includes(number % 10) && ![12, 13, 14].includes(number % 100)) return 'монеты';
            return 'монет';
        }
        const coinString = getCoinDeclension(totalBalls);
        document.getElementById("final-points").innerHTML = `
          <div>
            <div style="font-size: 50px">Ура!</div>
            <div>Ты прошёл квест и ответил на все вопросы!</div>
            <div style="margin-top: 10px">Твой результат: ${totalBalls} ${coinString}!</div>
            <div id="final-message-after-video" >
        <div>Скорее обратись к сотруднику Сбера на последней станции, получи свой диплом и приятный сюрприз!</div>
        <div>Приходи еще, котан!</div>
    </div>
          </div>
        `;
        document.getElementById("shareBtn").onclick = () => {
            try {
                navigator.share({
                    title: "Приглашение от друга!",
                    text: "Твой друг приглашает тебя в офис Сбера на игру!",
                    url: window.location.origin + '/friend_share_page.html'
                });
            } catch (e) {
                alert("Поделиться невозможно на этом устройстве.");
            }
        };

        document.getElementById("retryBtn").onclick = () => {
            localStorage.clear('currentStation');
            localStorage.clear('questionCount');
            localStorage.clear('total_balls');
            window.location.href = "qr.html";
        };
    }
    init();
</script>
<div id="camera-access-required"
     style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: black; color: white; text-align: center; z-index: 99999999;">
    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
        <h1 style="font-size: 60px;">Требуется доступ к камере</h1>
        <p style="font-size: 40px;">Пожалуйста, разрешите доступ к камере в настройках<br>браузера и обновите страницу.
        </p>
    </div>
</div>
</body>
</html>
